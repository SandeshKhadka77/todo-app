<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow | Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=Sora:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="dashboard-page">
    <div class="dashboard-shell">
        <header class="topbar glass-card">
            <div>
                <p class="pill">TaskFlow</p>
                <h1>My Task Workspace</h1>
            </div>
            <div class="topbar-actions">
                <button id="themeToggle" class="icon-btn" type="button" aria-label="Toggle dark mode">
                    <i class="fa-solid fa-moon"></i>
                </button>
                <a href="{{ url_for('logout') }}" class="logout-link">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    Logout
                </a>
            </div>
        </header>

        <section class="task-entry glass-card">
            <div class="entry-grid">
                <input id="taskInput" type="text" placeholder="What needs to be done?" maxlength="200">
                <select id="priorityInput">
                    <option value="Low">Low</option>
                    <option value="Medium" selected>Medium</option>
                    <option value="High">High</option>
                </select>
                <input id="dueDateInput" type="datetime-local" aria-label="Due date and time">
                <button id="addTaskBtn" class="primary-btn" type="button">
                    <i class="fa-solid fa-plus"></i>
                    Add Task
                </button>
            </div>
            <p id="formError" class="notice error hidden"></p>
        </section>

        <section class="controls glass-card">
            <div class="filters" id="filterGroup">
                <button class="filter-btn active" type="button" data-filter="all">All</button>
                <button class="filter-btn" type="button" data-filter="active">Active</button>
                <button class="filter-btn" type="button" data-filter="completed">Completed</button>
            </div>

            <div class="controls-right">
                <div class="search-box">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input id="searchInput" type="search" placeholder="Search tasks">
                </div>
                <select id="sortSelect">
                    <option value="created_desc">Newest first</option>
                    <option value="due_asc">Due date and time</option>
                    <option value="priority_desc">Priority</option>
                </select>
            </div>
        </section>

        <section class="metrics">
            <article class="metric-card glass-card">
                <p>Total Tasks</p>
                <h3 id="totalCount">0</h3>
            </article>
            <article class="metric-card glass-card">
                <p>Completed</p>
                <h3 id="completedCount">0</h3>
            </article>
            <article class="metric-card glass-card">
                <p>Open</p>
                <h3 id="activeCount">0</h3>
            </article>
        </section>

        <section class="task-list-wrap glass-card">
            <ul id="taskList" class="task-list"></ul>
            <div id="emptyState" class="empty-state hidden">
                <i class="fa-regular fa-clipboard"></i>
                <h3>No tasks yet</h3>
                <p>Add your first task to get started and build momentum.</p>
            </div>
        </section>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
