<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>TaskFlow | Sign In</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=Sora:wght@500;600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
	<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-page">
	<main class="auth-shell">
		<section class="auth-brand-panel">
			<p class="pill"><i class="fa-solid fa-layer-group"></i> TaskFlow </p>
			<h1>Focus on what matters. We track the tasks.</h1>
			<p>
				Plan, prioritize, and ship your day with a modern workflow built for
				individuals and teams.
			</p>
		</section>

		<section class="auth-card">
			<h2>Welcome back</h2>
			<p class="muted">Sign in to continue to your dashboard.</p>

			{% if error %}
			<div class="notice error">{{ error }}</div>
			{% endif %}

			<form method="POST" class="auth-form">
				<label for="username">Username</label>
				<input id="username" name="username" type="text" autocomplete="username" required minlength="3">

				<label for="password">Password</label>
				<input id="password" name="password" type="password" autocomplete="current-password" required>

				<button type="submit" class="primary-btn">Sign In</button>
			</form>

			<p class="auth-footer">
				New to TaskFlow?
				<a href="{{ url_for('register') }}">Create an account</a>
			</p>
		</section>
	</main>
</body>
</html>
